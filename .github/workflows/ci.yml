name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore backend dependencies
        run: dotnet restore backend/api/CableWinding.Api.Tests/CableWinding.Api.Tests.csproj

      - name: Build backend API
        run: dotnet build backend/api/CableWinding.Api/CableWinding.Api.csproj --configuration Release --no-restore

      - name: Run backend unit tests
        run: dotnet test backend/api/CableWinding.Api.Tests/CableWinding.Api.Tests.csproj --configuration Release --no-build --filter "Category=Unit"

      - name: Run backend integration tests
        run: dotnet test backend/api/CableWinding.Api.Tests/CableWinding.Api.Tests.csproj --configuration Release --no-build --filter "Category=Integration"

  frontend-tests:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm run test

      - name: Build frontend
        run: npm run build
