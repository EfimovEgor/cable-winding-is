<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — ИС намотки кабеля</title>
    <link rel="stylesheet" href="/theme.css">
    <style>
        body { display: flex; align-items: center; justify-content: center; padding: 24px; }
        .box { background: #fff; border-radius: 8px; padding: 32px; width: 100%; max-width: 360px; border: 1px solid #e5e5e5; }
        h1 { margin: 0 0 8px; font-size: 22px; color: #374151; }
        .sub { color: #6b7280; font-size: 14px; margin-bottom: 24px; }
        label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 6px; color: #374151; }
        input { width: 100%; padding: 10px 12px; border: 1px solid #e5e5e5; border-radius: 6px; font-size: 16px; margin-bottom: 16px; }
        input:focus { outline: none; border-color: #ea580c; }
        button { width: 100%; padding: 12px; background: #ea580c; color: #fff; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; }
        button:hover { background: #c2410c; }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .error { color: #dc2626; font-size: 14px; margin-top: 12px; }
        .hint { font-size: 12px; color: #6b7280; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="box">
        <h1>ИС намотки кабеля</h1>
        <p class="sub">Войдите под своей учётной записью</p>
        <form id="loginForm">
            <label for="login">Логин</label>
            <input type="text" id="login" name="login" required autocomplete="username" placeholder="operator / technologist / engineer">
            <label for="password">Пароль</label>
            <input type="password" id="password" name="password" required autocomplete="current-password">
            <button type="submit" id="btn">Войти</button>
        </form>
        <div id="error" class="error" style="display:none"></div>
        <div class="hint">
            Оператор: operator / operator123<br>
            Технолог: technologist / technologist123<br>
            Инженер: engineer / engineer123
        </div>
    </div>
    <script src="/auth.js"></script>
    <script src="/common.js"></script>
    <script>
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const login = document.getElementById('login').value.trim();
            const pwd = document.getElementById('password').value;
            const btn = document.getElementById('btn');
            const err = document.getElementById('error');
            err.style.display = 'none';
            btn.disabled = true;
            try {
                const r = await fetch(window.location.origin + '/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ login, password: pwd })
                });
                const text = await r.text();
                let data = {};
                if (text && text.trim()) {
                    try { data = JSON.parse(text); } catch (_) {}
                }
                if (r.ok && data.token) {
                    Auth.save(data.token, data.role, data.displayName);
                    window.location.href = typeof getHomeForRole === 'function' ? getHomeForRole() : '/index.html';
                } else {
                    err.textContent = data.error || (r.status === 401 ? 'Неверный логин или пароль' : r.status === 0 ? 'Сервер недоступен. Проверьте, что API запущен.' : 'Ошибка: ' + r.status + (text ? ' — ' + text.substring(0, 100) : ''));
                    err.style.display = 'block';
                }
            } catch (ex) {
                err.textContent = 'Ошибка: ' + ex.message;
                err.style.display = 'block';
            } finally {
                btn.disabled = false;
            }
        };
        if (Auth.getToken()) window.location.href = '/index.html';
    </script>
</body>
</html>
